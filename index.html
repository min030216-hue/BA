<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비즈니스 애널리틱스 응용 60제</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Nanum+Gothic+Coding:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Fira Code','Nanum Gothic Coding',monospace;background:#111318;color:#d4d8e2;min-height:100vh;font-size:13.5px;line-height:1.65}

/* Header */
header{background:linear-gradient(135deg,#181c28,#1e2338);border-bottom:2px solid #4f6ef7;padding:20px 18px 14px;text-align:center}
header h1{font-size:1.25rem;color:#7fa7ff;font-weight:700;margin-bottom:3px}
header .sub{font-size:0.76rem;color:#6b748c;margin-top:4px}

/* Score bar */
.sbar{display:flex;justify-content:center;gap:26px;padding:9px 18px;background:#181c28;border-bottom:1px solid #23283a;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(0,0,0,.55)}
.si{text-align:center;font-size:0.68rem;color:#555e78;letter-spacing:.05em}
.si span{display:block;font-size:1.15rem;font-weight:700}
.si.c span{color:#3fd980}.si.w span{color:#f07070}.si.t span{color:#7fa7ff}.si.p span{color:#e2a03f}
.pw{height:3px;background:#1e2338}
.pb{height:3px;background:linear-gradient(90deg,#4f6ef7,#3fd980);transition:width .4s}

/* Layout */
main{max-width:860px;margin:0 auto;padding:18px 13px 80px}

/* Section dividers */
.sec-head{display:flex;align-items:center;gap:10px;margin:30px 0 6px;font-size:0.72rem;font-weight:700;color:#7fa7ff;letter-spacing:.08em;text-transform:uppercase}
.sec-head::before,.sec-head::after{content:'';flex:1;height:1px;background:#23283a}
.sec-desc{font-size:0.74rem;color:#555e78;margin-bottom:14px;padding-left:4px}
.sub-tag{font-size:0.69rem;color:#3fd980;background:#0d1f14;border-left:3px solid #3fd980;padding:5px 11px;border-radius:0 5px 5px 0;margin:14px 0 8px}

/* Card base */
.card{background:#181c28;border:1px solid #252b3d;border-radius:10px;padding:15px 17px;margin-bottom:10px;transition:border-color .2s,background .2s}
.card.ok{border-color:#3fd980;background:#0c1c12}
.card.ng{border-color:#f07070;background:#1c0d0d}

.card-hd{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.badge{min-width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:0.66rem;font-weight:700;flex-shrink:0;margin-top:1px}
.badge-ox{background:#4f6ef7;color:#fff}
.badge-fb{background:#9b59b6;color:#fff}
.badge-cl{background:#e2a03f;color:#111}
.qtext{font-size:0.86rem;line-height:1.68;color:#c8cdd8}
.qtext code{font-family:'Fira Code',monospace;background:#1e2338;border:1px solid #2a3050;border-radius:3px;padding:1px 5px;color:#7fa7ff;font-size:0.82rem}

/* Hint */
.hint-btn{margin-top:8px;padding:4px 12px;background:transparent;border:1px solid #2a3050;color:#555e78;border-radius:5px;font-size:0.72rem;cursor:pointer;font-family:inherit;transition:all .15s}
.hint-btn:hover{border-color:#7fa7ff;color:#7fa7ff}
.hint-box{display:none;margin-top:7px;padding:7px 11px;background:#0e1625;border-left:3px solid #4f6ef7;border-radius:0 5px 5px 0;font-size:0.77rem;color:#7fa7ff;line-height:1.55}
.hint-box.open{display:block}

/* OX buttons */
.ox-btns{display:flex;gap:9px;margin-top:8px}
.ox-btn{width:56px;height:44px;border:2px solid transparent;border-radius:7px;font-size:1.35rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;display:flex;align-items:center;justify-content:center}
.ob{background:#0c1c12;border-color:#2a5c35;color:#3fd980}.ob:hover{background:#153325;border-color:#3fd980}
.xb{background:#1c0d0d;border-color:#5c2a2a;color:#f07070}.xb:hover{background:#2a1212;border-color:#f07070}
.ob.sel{background:#3fd980;border-color:#3fd980;color:#0d1117}
.xb.sel{background:#f07070;border-color:#f07070;color:#fff}
.ox-btn:disabled{opacity:.35;cursor:not-allowed}

/* Text input */
.ti-wrap{margin-top:8px}
.ti{width:100%;padding:8px 12px;background:#0d1117;border:1.5px solid #252b3d;border-radius:7px;color:#e0e4f0;font-family:'Fira Code','Nanum Gothic Coding',monospace;font-size:0.88rem;outline:none;transition:border-color .2s}
.ti:focus{border-color:#4f6ef7}
.ti:disabled{opacity:.4;cursor:not-allowed}
.ti::placeholder{color:#323852}
.btn-row{display:flex;gap:7px;margin-top:7px}
.btn-chk{padding:6px 18px;background:#4f6ef7;color:#fff;border:none;border-radius:5px;font-size:0.8rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s,transform .1s}
.btn-chk:hover{background:#6080ff}.btn-chk:active{transform:scale(.97)}.btn-chk:disabled{opacity:.3;cursor:not-allowed}
.btn-show{padding:6px 12px;background:transparent;border:1px solid #252b3d;color:#555e78;border-radius:5px;font-size:0.76rem;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-show:hover{border-color:#e2a03f;color:#e2a03f}.btn-show:disabled{opacity:.3;cursor:not-allowed}

/* Feedback */
.fb{display:none;margin-top:9px;border-radius:7px;overflow:hidden;font-size:0.79rem}
.fb.show{display:block}
.fb-top{padding:6px 12px;font-weight:700;font-size:0.8rem}
.fb.ok .fb-top{background:#163d22;color:#6ee7b7}
.fb.ng .fb-top{background:#3d1616;color:#fca5a5}
.fb-ans{background:#0d1117;border-top:1px solid #1e2535;padding:7px 12px;color:#e0e8ff;font-size:0.79rem}
.fb-exp{padding:6px 12px;color:#6b748c;font-size:0.75rem;line-height:1.5;background:#14182a;border-top:1px solid #1e2535}

/* Result */
.result{display:none;text-align:center;padding:18px;background:#0c1c12;border:1.5px solid #3fd980;border-radius:11px;margin-bottom:20px}
.result.show{display:block}
.result h2{font-size:1.15rem;color:#3fd980;margin-bottom:5px}
.result p{font-size:0.83rem;color:#6ee7b7}

/* Actions */
.actions{display:flex;gap:10px;justify-content:center;margin-top:22px;flex-wrap:wrap}
.act{padding:9px 22px;border-radius:7px;font-size:0.84rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.act-a{background:transparent;border:1.5px solid #7fa7ff;color:#7fa7ff}.act-a:hover{background:#7fa7ff;color:#0d1117}
.act-r{background:transparent;border:1.5px solid #555e78;color:#555e78}.act-r:hover{background:#555e78;color:#0d1117}
</style>
</head>
<body>

<header>
  <h1>📋 비즈니스 애널리틱스 응용 이론 & 계산 60제</h1>
  <div class="sub">기말고사 완벽 대비 · OX 이론 25 + 빈칸 추론 25 + 핵심 계산 10</div>
</header>

<div class="sbar">
  <div class="si t"><span id="s-tot">60</span>문제</div>
  <div class="si c"><span id="s-cor">0</span>정답</div>
  <div class="si w"><span id="s-wrg">0</span>오답</div>
  <div class="si p"><span id="s-pct">0%</span>점수</div>
</div>
<div class="pw"><div class="pb" id="pb" style="width:0%"></div></div>

<main>
  <div class="result" id="result"><h2 id="r-title"></h2><p id="r-msg"></p></div>
  <div id="container"></div>
  <div class="actions">
    <button class="act act-a" onclick="showAll()">전체 정답 보기</button>
    <button class="act act-r" onclick="resetAll()">다시 풀기</button>
  </div>
</main>

<script>
// ══════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════

const OX_DATA = [
  // [question, answer, hint, explanation]
  ["K-means에서 이상치(Outlier)가 있을 경우, 중심점이 평균을 쫓아가는 특성 덕분에 이상치의 영향을 거의 받지 않고 안정적인 군집화가 가능하다.",
   "X","키워드: 평균, 이상치, 무게중심","K-means는 거리의 '평균'을 구하기 때문에 이상치라는 극단적인 값이 있으면 무게중심이 크게 흔들려 이상치에 매우 민감한 단점을 지닙니다."],

  ["데이터를 '평균 0, 표준편차 1'인 정규분포로 만드는 것은 정규화(Normalization), 0과 1 사이의 값으로 압축하는 것은 표준화(Standardization)라고 부른다.",
   "X","키워드: 0~1 압축 vs Z-score","설명이 서로 뒤바뀌었습니다. 평균 0, 표준편차 1은 표준화(Z-scoring)이고, 0~1 값으로 Min-Max 압축을 하는 것은 정규화(Min-Max)입니다."],

  ["계층적 군집분석(Hierarchical clustering)은 사전에 분석가가 군집 수(K)를 정해두지 않고 덴드로그램 등을 통해 군집을 형성해나가는 방식이다.",
   "O","비계층적(K-means)과의 차이점","계층적 군집분석은 사전에 K를 설정하지 않는 반면, K-means 같은 비계층적 분석은 미리 K값을 지정해야 합니다."],

  ["KNN(K-Nearest Neighbor)은 훈련 데이터를 사전에 철저히 학습하여 모델을 만들어 두기 때문에, 새로운 테스트 데이터가 들어왔을 때 예측 속도가 매우 빠른 특성을 지닌다.",
   "X","키워드: Lazy Learning, 예측 시점 연산","KNN은 훈련 데이터를 사전에 학습하여 모델링을 해두지 않는 Lazy Learning 방식입니다. 즉, 예측(Test) 시점에 연산이 몰려 예측 속도가 느립니다."],

  ["코사인 유사도(Cosine Similarity)는 두 벡터 간의 방향 일치도를 각도로 측정하므로 두 데이터가 향하는 패턴이 얼마나 유사한지를 판단하는 데 특화되어 있다.",
   "O","유클리드 거리와 비교: 거리 vs 각도","코사인 유사도는 거리의 차이가 아닌 두 벡터 간의 방향, 각도를 바탕으로 데이터의 유사한 흐름을 측정합니다."],

  ["잠재계층분석(LCA)은 K-means와 마찬가지로 하나의 소비자가 오직 하나의 세분시장에만 속한다는 엄격한 Non-overlapping 구조를 채택하고 있다.",
   "X","키워드: Fuzzy set, 혼합 모형, 확률","K-means가 한 집단에만 소속되는 엄격한 Non-overlapping이고, LCA는 소비자가 A집단에 70%, B집단에 30% 등 다중으로 소속될 수 있는 Overlapping (Fuzzy)을 채택합니다."],

  ["LCA 모형이 수학적으로 성립하기 위해서는 특정 세분시장이 결정되었을 때, 응답자의 하위 관측변수 응답 확률이 서로에게 아무런 영향을 미치지 않는다는 '조건부 독립' 가정이 성립해야 한다.",
   "O","반대 개념: 조건부 종속","LCA를 수행하기 위한 수학적 대전제인 '조건부 독립'에 대한 정확한 설명입니다."],

  ["LCA를 이용해 최적의 세분시장 개수를 탐색할 때, 표본 수가 충분히 클 경우 모형 복잡도에 대해 더 강하게 페널티를 부과하는 통계량은 BIC가 아니라 AIC이다.",
   "X","AIC vs BIC: 표본 크기와 페널티 강도","표본 수가 많을 때 모형 복잡도에 대해 패널티를 훨씬 더 강하게 부과하는 통계량은 AIC가 아니라 BIC입니다. 최적 모형 선정 시 BIC를 우선 참고합니다."],

  ["잠재계층분석(LCA)은 거리를 계산하기 힘든 이산형(범주형) 변수를 기반으로 시장을 세분화할 때, K-means 알고리즘을 대체하여 매우 훌륭한 대안이 될 수 있다.",
   "O","K-means의 한계: 연속형 변수만 가능","K-means는 평균 거리를 구해야 해 실수(연속형) 변수만 가능하지만, LCA는 명목형(이산형/범주형) 변수 세분화에 아주 탁월합니다."],

  ["LCA의 도출 결과물인 '항목반응행렬'은 각 집단별 평균 거리를 나타내는 표로서, 이를 통해 군집 내 이상치(Outlier)를 제거하고 프로파일링을 수행한다.",
   "X","항목반응행렬 = 조건부 확률표","항목반응행렬은 평균 거리를 뜻하거나 이상치를 지우는 용도가 아닙니다. 세분시장이 특정 응답 보기를 고를 '조건부 확률'을 도표화한 것으로 프로파일링에 이용됩니다."],

  ["A-priori 알고리즘은 '비빈발 집합의 하위 집합(부분집합) 역시 비빈발하다'는 원리를 이용하여, 불필요한 규칙 조합 연산을 획기적으로 줄이는 알고리즘이다.",
   "O","Apriori 핵심 원리: 비빈발 집합 제거","A-priori 알고리즘의 핵심 작동 원리로, 지지도 계산의 기하급수적 부하를 쳐냅니다."],

  ["향상도(Lift)가 1이라는 것은 품목 A와 B의 구매가 완벽히 종속되어 있어, 묶음 상품(Bundling)으로 출시할 경우 마케팅 효율이 극대화되는 아주 유용한 규칙임을 나타낸다.",
   "X","Lift 값 해석: 1 = 독립, >1 = 양의 상관","향상도(Lift)가 정확히 1이라는 것은 두 품목 간의 구매가 완전한 독립 사건임을 뜻하므로 묶음 판매 시 아무런 시너지 효과가 없습니다. 1보다 '커야' 유용합니다."],

  ["신뢰도(Confidence)는 전체 거래 중에서 항목 A와 항목 B가 동시에 장바구니에 담긴 교집합 거래 건수의 비율을 의미하는 절대적 지표이다.",
   "X","교집합 비율 = 지지도(Support)","교집합의 절대적 비율은 신뢰도가 아니라 지지도(Support)에 대한 설명입니다. 신뢰도는 A를 샀다는 전제 하의 조건부 확률입니다."],

  ["연관규칙분석의 한계점 중 하나는 고객이 해당 품목을 샀는지 안 샀는지(Yes/No)만 분석할 뿐, 실제 구매한 수량(거래량)은 전혀 패턴 분석에 반영하지 못한다는 점이다.",
   "O","장바구니 분석 한계: 수량 무시","장바구니 분석은 데이터가 단순해 연산이 가볍지만 구매한 수량(Quantity) 정보는 깡그리 무시된다는 맹점이 존재합니다."],

  ["시차연관성규칙(Sequential Association Rule)을 적용하면, 단순히 함께 구매되는 품목뿐 아니라 특정 행위 이후 뒤따라 발생할 미래 수요까지 예측할 수 있다.",
   "O","시차 연관 = 선후관계 수요예측","시간적 시퀀스 개념을 넣으면 '유모차를 산 고객이 일주일 뒤 기저귀를 산다'는 선후 관계 예측이 가능해집니다."],

  ["의사결정나무 모델에서 '중간 노드(Internal Node)'는 트리 구조상 부모 노드이면서 동시에 자식 노드의 역할을 모두 수행하는 연결 마디이다.",
   "O","뿌리-중간-잎사귀 노드 구분","뿌리에서 잎사귀로 이어지는 줄기에 위치해, 위로는 자식 역할을 아래로는 부모 역할을 수행하는 중간 노드 설명입니다."],

  ["CART 알고리즘은 목표변수가 범주형(이산형)일 때 트리를 여러 갈래로 분리하는 다지분할(Multi-way split)을 허용하며, 분할 기준으로 '카이제곱 통계량'을 사용한다.",
   "X","CART = 무조건 2진 분할, 지니계수 사용","CART는 다지분할을 허용하지 않으며 무조건 2진 분할(Binary)만을 고집합니다. 또한 카이제곱 통계량은 CHAID의 방식입니다."],

  ["CART 알고리즘에서 특정 노드의 지니 불순도(Gini Impurity)가 0에 가까워진다는 것은, 해당 집단에 여러 범주의 데이터가 심하게 섞여 있어 불확실성이 최대치가 되었음을 의미한다.",

let correct=0, wrong=0, answered=0;
const TOTAL = OX_DATA.length + FIB_DATA.length + CALC_DATA.length;

// ══════════════════════════════════════════
//  NORMALISE
// ══════════════════════════════════════════
function norm(s){return s.trim().toLowerCase().replace(/\s+/g,' ')}
function match(user, arr){return arr.some(a=>norm(a)===norm(user))}

//  HINT TOGGLE
// ══════════════════════════════════════════
function toggleHint(id){
  const box=document.getElementById(id);
  box.classList.toggle('open');
}

//  BUILD
// ══════════════════════════════════════════
function buildAll(){
  const c=document.getElementById('container');
  c.innerHTML='';

  /* ── OX ── */
  c.insertAdjacentHTML('beforeend',`
    <div class="sec-head">영역 1 · 헷갈리기 쉬운 OX 이론 (25문항)</div>
    <div class="sec-desc">※ 다음 문장을 주의 깊게 읽고, 맞으면 O 틀리면 X 버튼을 클릭하시오.</div>
  `);

  const oxSubs=[
    {at:0,text:"🔵 군집분석 & KNN · Q1~5"},
    {at:5,text:"🟢 잠재계층분석 (LCA) · Q6~10"},
    {at:10,text:"🟡 연관분석 (Association Rules) · Q11~15"},
    {at:15,text:"🟠 의사결정나무 (Decision Tree) · Q16~20"},
    {at:20,text:"🔴 랜덤 포레스트 & 앙상블 · Q21~25"},
  ];
  OX_DATA.forEach((d,i)=>{
    const sub=oxSubs.find(s=>s.at===i);
    if(sub) c.insertAdjacentHTML('beforeend',`<div class="sub-tag">${sub.text}</div>`);
    c.appendChild(makeOxCard(d,i));
  });

  /* ── FIB ── */
  c.insertAdjacentHTML('beforeend',`
    <div class="sec-head">영역 2 · 이론 및 개념 빈칸 추론 (25문항)</div>
    <div class="sec-desc">※ 빈칸에 들어갈 알맞은 핵심 명사(개념어)를 입력하시오.</div>
  `);
  FIB_DATA.forEach((d,i)=>c.appendChild(makeFibCard(d,i)));

  /* ── CALC ── */
  c.insertAdjacentHTML('beforeend',`
    <div class="sec-head">영역 3 · 핵심 계산 문제 (10문항)</div>
    <div class="sec-desc">※ 주어진 수치를 바탕으로 계산하여 최종 결과값을 입력하시오. (Ctrl+Enter로 채점)</div>
  `);
  CALC_DATA.forEach((d,i)=>c.appendChild(makeCalcCard(d,i)));
}

/* ── OX Card ── */
function makeOxCard(d,i){
  const el=document.createElement('div');
  el.className='card'; el.id=`ox-${i}`;
  el.innerHTML=`
    <div class="card-hd">
      <div class="badge badge-ox">Q${i+1}</div>
      <div class="qtext">${d[0]}</div>
    </div>
    <div class="ox-btns">
      <button class="ox-btn ob" id="ob-${i}" onclick="checkOx(${i},'O')">O</button>
      <button class="ox-btn xb" id="xb-${i}" onclick="checkOx(${i},'X')">X</button>
    </div>
    <button class="hint-btn" onclick="toggleHint('hint-ox-${i}')">💡 힌트</button>
    <div class="hint-box" id="hint-ox-${i}">${d[2]}</div>
    <div class="feedback" id="fb-ox-${i}"></div>
  `;
  return el;
}

function checkOx(i,chosen){
  const ob=document.getElementById(`ob-${i}`);
  const xb=document.getElementById(`xb-${i}`);
  if(ob.disabled) return;
  ob.disabled=true; xb.disabled=true;
  if(chosen==='O') ob.classList.add('sel');
  else             xb.classList.add('sel');
  const d=OX_DATA[i];
  const ok=chosen===d[1];
  answered++;
  ok?correct++:wrong++;
  const card=document.getElementById(`ox-${i}`);
  const fb=document.getElementById(`fb-ox-${i}`);
  card.classList.add(ok?'ok':'ng');
  fb.className=`feedback ${ok?'ok':'ng'} show`;
  fb.innerHTML=`<div class="fb-top">${ok?'✅ 정답!':'❌ 오답!'} 정답: <strong>${d[1]}</strong></div><div class="fb-exp">${d[3]}</div>`;
  updateScore();
  if(answered===TOTAL) showResult();
}

/* ── FIB Card ── */
function makeFibCard(d,i){
  const num=i+1;
  const el=document.createElement('div');
  el.className='card'; el.id=`fib-${i}`;
  el.innerHTML=`
    <div class="card-hd">
      <div class="badge badge-fb">${num}</div>
      <div class="qtext">${d[0]}</div>
    </div>
    <div class="ti-wrap">
      <input class="ti" id="fi-${i}" type="text" placeholder="정답을 입력하세요..."
        onkeydown="if((event.ctrlKey||event.metaKey)&&event.key==='Enter') checkFib(${i})">
      <div class="btn-row">
        <button class="btn-chk" id="fc-${i}" onclick="checkFib(${i})">채점</button>
        <button class="btn-show" id="fs-${i}" onclick="revealFib(${i})">정답 보기</button>
      </div>
    </div>
    <button class="hint-btn" onclick="toggleHint('hint-fib-${i}')">💡 힌트</button>
    <div class="hint-box" id="hint-fib-${i}">${d[2]}</div>
    <div class="feedback" id="fb-fib-${i}"></div>
  `;
  return el;
}

function checkFib(i){
  const inp=document.getElementById(`fi-${i}`);
  const fc=document.getElementById(`fc-${i}`);
  const fs=document.getElementById(`fs-${i}`);
  if(fc.disabled) return;
  if(!inp.value.trim()){inp.focus();return;}
  const d=FIB_DATA[i];
  const ok=match(inp.value,d[1]);
  inp.disabled=true; fc.disabled=true; fs.disabled=true;
  answered++;
  ok?correct++:wrong++;
  const card=document.getElementById(`fib-${i}`);
  const fb=document.getElementById(`fb-fib-${i}`);
  card.classList.add(ok?'ok':'ng');
  fb.className=`feedback ${ok?'ok':'ng'} show`;
  fb.innerHTML=`<div class="fb-top">${ok?'✅ 정답!':'❌ 오답!'}</div><div class="fb-ans">정답: ${d[4]}</div><div class="fb-exp">${d[3]}</div>`;
  updateScore();
  if(answered===TOTAL) showResult();
}

function revealFib(i){
  const fc=document.getElementById(`fc-${i}`);
  const fs=document.getElementById(`fs-${i}`);
  if(fs.disabled) return;
  document.getElementById(`fi-${i}`).disabled=true;
  fc.disabled=true; fs.disabled=true;
  const card=document.getElementById(`fib-${i}`);
  const fb=document.getElementById(`fb-fib-${i}`);
  if(!card.classList.contains('ok')&&!card.classList.contains('ng')){
    answered++; wrong++;
    card.classList.add('ng');
    updateScore();
  }
  const d=FIB_DATA[i];
  fb.className='feedback ng show';
  fb.innerHTML=`<div class="fb-top">📖 정답</div><div class="fb-ans">정답: ${d[4]}</div><div class="fb-exp">${d[3]}</div>`;
  if(answered===TOTAL) showResult();
}

/* ── Score ── */
function updateScore(){
  document.getElementById('s-cor').textContent=correct;
  document.getElementById('s-wrg').textContent=wrong;
  const pct=answered>0?Math.round(correct/answered*100):0;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('pb').style.width=Math.round(answered/TOTAL*100)+'%';
}

/* ── Result (no scroll to top) ── */
function showResult(){
  const pct=Math.round(correct/TOTAL*100);
  const es=['💪','📚','🎉','🏆'];
  const ms=['다시 한 번 도전해보세요! 핵심 개념을 복습하고 재시도를 추천합니다.',
            '절반 이상! 틀린 문제의 해설을 다시 확인해보세요.',
            '잘 하셨어요! 마지막 점검을 해보세요.',
            '완벽합니다! 기말고사 준비 완료!'];
  const t=pct>=90?3:pct>=70?2:pct>=50?1:0;
  document.getElementById('r-title').textContent=`${es[t]} ${correct}/${TOTAL} 정답 (${pct}점)`;
  document.getElementById('r-msg').textContent=ms[t];
  document.getElementById('result').classList.add('show');
  // 맨 위로 스크롤하지 않음
}

/* ── Show All ── */
function showAll(){
  OX_DATA.forEach((_,i)=>{const ob=document.getElementById(`ob-${i}`);if(!ob.disabled)checkOx(i,'?');});
  FIB_DATA.forEach((_,i)=>{const fs=document.getElementById(`fs-${i}`);if(!fs.disabled)revealFib(i);});
  CALC_DATA.forEach((_,i)=>{const cs=document.getElementById(`cs-${i}`);if(!cs.disabled)revealCalc(i);});
}

/* ── Reset ── */
function resetAll(){
  correct=wrong=answered=0;
  document.getElementById('result').classList.remove('show');
  document.getElementById('s-cor').textContent='0';
  document.getElementById('s-wrg').textContent='0';
  document.getElementById('s-pct').textContent='0%';
  document.getElementById('pb').style.width='0%';
  buildAll();
  window.scrollTo({top:0,behavior:'smooth'});
}

buildAll();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터 마이닝 퀴즈</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 28px 24px 20px;
    text-align: center;
    box-shadow: 0 4px 12px rgba(102,126,234,0.3);
  }
  header h1 { font-size: 1.7rem; font-weight: 700; margin-bottom: 6px; }
  header p { font-size: 0.9rem; opacity: 0.85; }

  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 16px 24px;
    background: white;
    border-bottom: 1px solid #e2e8f0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .score-item {
    text-align: center;
    font-size: 0.82rem;
    color: #718096;
  }
  .score-item span {
    display: block;
    font-size: 1.4rem;
    font-weight: 700;
    color: #2d3748;
  }
  .score-item.correct span { color: #38a169; }
  .score-item.wrong span { color: #e53e3e; }
  .score-item.remain span { color: #667eea; }

  .progress-bar-wrap {
    height: 4px;
    background: #e2e8f0;
  }
  .progress-bar {
    height: 4px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    transition: width 0.4s ease;
  }

  main {
    max-width: 860px;
    margin: 24px auto;
    padding: 0 16px 60px;
  }

  .quiz-card {
    background: white;
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    border: 2px solid transparent;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .quiz-card.answered-correct {
    border-color: #68d391;
    background: #f0fff4;
  }
  .quiz-card.answered-wrong {
    border-color: #fc8181;
    background: #fff5f5;
  }

  .question-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
  }
  .q-num {
    min-width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .q-text {
    font-size: 0.97rem;
    line-height: 1.65;
    color: #2d3748;
  }
  .blank {
    display: inline-block;
    border-bottom: 2px solid #667eea;
    min-width: 80px;
    color: #667eea;
    font-weight: 600;
  }

  .answer-area {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 4px;
  }
  .answer-input {
    flex: 1;
    padding: 9px 14px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
    transition: border-color 0.2s;
    outline: none;
    background: #f7fafc;
  }
  .answer-input:focus {
    border-color: #667eea;
    background: white;
  }
  .answer-input:disabled {
    cursor: not-allowed;
    background: #edf2f7;
    color: #718096;
  }
  .check-btn {
    padding: 9px 18px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
    font-family: inherit;
  }
  .check-btn:hover { opacity: 0.9; }
  .check-btn:active { transform: scale(0.97); }
  .check-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .feedback {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.88rem;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct {
    background: #c6f6d5;
    color: #276749;
    border-left: 4px solid #38a169;
  }
  .feedback.wrong {
    background: #fed7d7;
    color: #9b2c2c;
    border-left: 4px solid #e53e3e;
  }
  .feedback .correct-answer {
    font-weight: 700;
    margin-top: 3px;
  }
  .feedback .explanation {
    margin-top: 5px;
    color: inherit;
    opacity: 0.85;
    font-size: 0.83rem;
  }

  .actions {
    text-align: center;
    margin-top: 32px;
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-reset {
    padding: 12px 28px;
    border: 2px solid #667eea;
    background: white;
    color: #667eea;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-reset:hover { background: #667eea; color: white; }

  .btn-show-all {
    padding: 12px 28px;
    border: 2px solid #718096;
    background: white;
    color: #718096;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-show-all:hover { background: #718096; color: white; }

  .result-banner {
    display: none;
    text-align: center;
    padding: 20px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border-radius: 14px;
    margin-bottom: 24px;
    box-shadow: 0 4px 20px rgba(102,126,234,0.35);
  }
  .result-banner.show { display: block; }
  .result-banner h2 { font-size: 1.4rem; margin-bottom: 6px; }
  .result-banner p { opacity: 0.9; font-size: 0.95rem; }

  @media (max-width: 600px) {
    .answer-area { flex-direction: column; align-items: stretch; }
    .check-btn { width: 100%; }
    .q-text { font-size: 0.9rem; }
  }
</style>
</head>
<body>

<header>
  <h1>📊 데이터 마이닝 & 머신러닝 퀴즈</html>
  <p>빈칸에 정답을 입력하고 확인 버튼을 누르세요</p>
</header>

<div class="scoreboard">
  <div class="score-item remain">
    <span id="s-total">50</span>문제
  </div>
  <div class="score-item correct">
    <span id="s-correct">0</span>정답
  </div>
  <div class="score-item wrong">
    <span id="s-wrong">0</span>오답
  </div>
  <div class="score-item">
    <span id="s-score">0%</span>점수
  </div>
</div>
<div class="progress-bar-wrap">
  <div class="progress-bar" id="progress-bar" style="width:0%"></div>
</div>

<main>
  <div class="result-banner" id="result-banner">
    <h2 id="result-title"></h2>
    <p id="result-msg"></p>
  </div>
  <div id="quiz-container"></div>
  <div class="actions">
    <button class="btn-show-all" onclick="showAllAnswers()">전체 정답 보기</button>
    <button class="btn-reset" onclick="resetQuiz()">다시 풀기</button>
  </div>
</main>

<script>
const quizData = [
  { q: "데이터를 분류할 때, 어떤 기준으로 분류할지에 대한 사전 정보(Label)가 존재하여 이를 바탕으로 예측하는 지도학습 기법은 ( ) 이다.", a: ["분류", "classification", "분류(classification)"], display: "분류(Classification)", exp: "사전에 정답(Label)이 주어진 상태에서 타겟을 그룹화하는 지도학습 기법입니다." },
  { q: "훈련 데이터에 대한 별도의 사전 학습(Train) 없이, 테스트 데이터가 들어오면 그제서야 거리를 계산하는 예측 알고리즘 특성을 ( ) 이라 한다.", a: ["lazy learning", "레이지 러닝", "레이지러닝"], display: "Lazy Learning", exp: "KNN의 가장 큰 특징으로, 미리 모델을 만들지 않고 예측 요청 시점에 연산을 몰아서 합니다." },
  { q: "가장 가까운 이웃 K개의 개체를 찾은 뒤 그 이웃들의 다수결에 따라 새로운 데이터의 범주를 예측하는 초보적인 알고리즘은 ( ) 이다.", a: ["knn", "k-nearest neighbor", "k nearest neighbor", "케이엔엔"], display: "KNN", exp: "K-Nearest Neighbor. 가까운 K명의 이웃의 클래스를 다수결로 따르는 알고리즘입니다." },
  { q: "K-means 알고리즘은 연구자가 사전에 군집의 수(K)를 미리 정해놓고 최적화해 나가는 ( ) 에 속한다.", a: ["비계층적 군집분석", "비계층적군집분석", "비계층적 군집", "비계층 군집분석"], display: "비계층적 군집분석", exp: "덴드로그램 없이 연구자가 미리 클러스터 개수(K)를 지정하는 방식입니다." },
  { q: "공간상 두 개체 간의 최단 직선 거리를 계산하는 방식으로, 군집 분석에서 데이터가 '얼마나 다른지(비유사성)'를 측정하는 가장 보편적인 척도는 ( ) 이다.", a: ["유클리드 거리", "유클리드거리", "euclidean distance", "euclidean"], display: "유클리드 거리", exp: "피타고라스 정리를 이용한 직선 최단 거리로, 비유사성을 잴 때 가장 기본적으로 쓰입니다." },
  { q: "거리가 아니라 두 벡터의 각도를 계산하여, 데이터가 향하는 방향이 '얼마나 같은지(유사성)'를 판단하는 척도는 ( ) 이다.", a: ["코사인 유사도", "코사인유사도", "cosine similarity", "cosine"], display: "코사인 유사도", exp: "벡터의 각도(방향성)를 이용해 1과 -1 사이의 유사성 측도로 활용됩니다." },
  { q: "거리 기반 군집화 시 특정 변수의 단위(Scale)가 너무 커서 결과가 왜곡되는 것을 막고자, 데이터를 0에서 1 사이의 값으로 축소(Min-Max)하는 변환을 ( ) (이)라 한다.", a: ["정규화", "normalization", "min-max 정규화", "min max 정규화"], display: "정규화(Normalization)", exp: "이상치가 없을 때 변수를 0~1 값으로 스케일링하는 Min-Max 기법입니다." },
  { q: "반면, 데이터를 평균이 0이고 표준편차가 1인 정규분포 형태로 변환시켜 통제하는 Z-scoring 방식은 ( ) (이)라 한다.", a: ["표준화", "standardization", "z-scoring", "z scoring", "z스코어링"], display: "표준화(Standardization)", exp: "평균을 0, 표준편차를 1로 맞추어 극단적인 값이 있을 때 주로 사용하는 Z-score 기법입니다." },
  { q: "K-means 알고리즘은 거리와 평균을 지속적으로 계산해야 하므로, 투입되는 변수가 반드시 실수 값을 갖는 ( ) 변수여야만 한다는 한계가 있다.", a: ["연속형", "연속형 변수", "continuous"], display: "연속형", exp: "거리를 재고 평균을 내야 하므로 명목형(문자열 등) 데이터로는 K-means를 돌릴 수 없습니다." },
  { q: "K-means는 평균을 기반으로 중심을 이동시키기 때문에, 극단적인 값인 ( ) 이/가 존재할 경우 초기값 설정과 군집 결과가 크게 흔들린다.", a: ["이상치", "outlier", "이상값"], display: "이상치(Outlier)", exp: "평균을 쫓아가는 K-means의 특성상 극단값 하나가 생기면 무게중심이 쏠려 결과가 망가집니다." },
  { q: "K-means 반복 과정 중, 각 군집에 할당된 개체들의 평균 좌표로 매번 새롭게 계산되어 이동하는 지점을 ( ) (이)라 한다.", a: ["중심점", "centroid", "센트로이드"], display: "중심점(Centroid)", exp: "군집의 가운데를 뜻하며, 소속된 개체들의 좌표 평균값으로 계속 갱신됩니다." },
  { q: "K-means를 처음 시작할 때 초기 K개의 중심점은 연구자의 개입 없이 알고리즘에 의해 ( ) 로 설정된다.", a: ["무작위", "random", "랜덤", "무작위(random)"], display: "무작위(Random)", exp: "초기에 K개의 중심점이 랜덤으로 찍히기 때문에 분석할 때마다 결과가 달라질 수 있습니다." },
  { q: "K-means가 수치 데이터를 요구하는 반면, 잠재계층분석(LCA)은 성별, 구매 동기 등 이산적인 ( ) 변수를 기반으로 소비자를 세분화할 때 적합하다.", a: ["범주형", "categorical", "범주형 변수"], display: "범주형", exp: "외식동기, 직업 등 명목/범주형 변수로 세분시장을 확률적으로 나눌 때 LCA가 강력합니다." },
  { q: "K-means처럼 소비자가 한 군집에만 속하는 것(Non-overlapping)이 아니라, 소비자가 여러 군집에 속할 확률을 0~1 사이로 부드럽게 제시하는 모델 구조를 ( ) 셋(Set)이라 한다.", a: ["퍼지", "fuzzy"], display: "퍼지(Fuzzy)", exp: "경계가 칼같이 나뉘는 것이 아니라 소속 확률을 부여하는 방식입니다." },
  { q: "각 세분시장의 종속변수가 2개 이상의 범주(보기)를 가질 때, 각 범주에 응답할 확률은 통계적으로 ( ) 를 따른다고 모형에서 가정한다.", a: ["다항분포", "multinomial distribution", "multinomial"], display: "다항분포", exp: "여러 개의 카테고리 중 하나를 선택할 확률 분포를 가정합니다. (이항분포의 확장)" },
  { q: "LCA 모형이 성립하기 위한 핵심 전제로, 특정 잠재계층(세분시장)이 주어졌을 때 응답자가 개별 하위 문항들에 응답할 확률은 서로 영향을 미치지 않는다는 가정을 ( ) (이)라 한다.", a: ["조건부 독립", "conditional independence", "조건부독립"], display: "조건부 독립", exp: "잠재계층이 A로 정해지면, 응답자가 1번과 2번 문항에 답할 확률은 서로 영향이 없다는 필수 가정입니다." },
  { q: "여러 개의 세분시장 모델 중 최적의 시장 개수(K)를 결정할 때, 표본 수가 많을수록 복잡도에 더 큰 페널티를 부여하여 최적점을 찾는 정보 기준 통계량은 ( ) 이다.", a: ["bic", "베이지안 정보 기준", "bayesian information criterion"], display: "BIC", exp: "표본(N)이 커지면 AIC보다 더 강한 페널티를 주어 단순한 모형을 채택하게 합니다." },
  { q: "LCA 도출 결과물로, 각 잠재계층(집단)이 특정 설문 문항의 특정 응답을 선택할 조건부 확률을 도표로 정리한 매트릭스를 ( ) (이)라 한다.", a: ["항목반응행렬", "항목 반응 행렬", "item response matrix"], display: "항목반응행렬", exp: "집단 1이 '한식당'을 고를 확률 0.613 등으로 도출된 표이며, 집단 성격을 정의하는 핵심 자료입니다." },
  { q: "도출된 군집의 인구통계학적 특성과 응답 확률을 종합하여, 각 세분시장에 비즈니스적 페르소나와 이름을 부여하는 후반 해석 작업을 ( ) (이)라 한다.", a: ["프로파일링", "profiling"], display: "프로파일링(Profiling)", exp: "군집분석 후 도출된 집단에 의미(예: 편의추구형 20대 집단)를 해석해 붙여주는 작업입니다." },

let correctCount = 0;
let wrongCount = 0;
let answeredCount = 0;

function normalize(str) {
  return str.trim().toLowerCase().replace(/\s+/g, ' ');
}

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  quizData.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.id = `card-${i}`;

    card.innerHTML = `
      <div class="question-header">
        <div class="q-num">${i+1}</div>
        <div class="q-text">${item.q.replace('( )', '<span class="blank">　　　</span>')}</div>
      </div>
      <div class="answer-area">
        <input type="text" class="answer-input" id="input-${i}" placeholder="정답을 입력하세요..."
          onkeydown="if(event.key==='Enter') checkAnswer(${i})">
        <button class="check-btn" id="btn-${i}" onclick="checkAnswer(${i})">확인</button>
      </div>
      <div class="feedback" id="feedback-${i}"></div>
    `;
    container.appendChild(card);
  });
}

function checkAnswer(i) {
  const input = document.getElementById(`input-${i}`);
  const btn = document.getElementById(`btn-${i}`);
  const card = document.getElementById(`card-${i}`);
  const feedback = document.getElementById(`feedback-${i}`);

  if (btn.disabled) return;
  const userAns = normalize(input.value);
  if (!userAns) { input.focus(); return; }

  const item = quizData[i];
  const isCorrect = item.a.some(ans => normalize(ans) === userAns);

  input.disabled = true;
  btn.disabled = true;
  answeredCount++;

  if (isCorrect) {
    correctCount++;
    card.classList.add('answered-correct');
    feedback.className = 'feedback correct show';
    feedback.innerHTML = `✅ 정답입니다! <span class="correct-answer">정답: ${item.display}</span><div class="explanation">${item.exp}</div>`;
  } else {
    wrongCount++;
    card.classList.add('answered-wrong');
    feedback.className = 'feedback wrong show';
    feedback.innerHTML = `❌ 오답입니다. <span class="correct-answer">정답: ${item.display}</span><div class="explanation">${item.exp}</div>`;
  }

  updateScore();
  if (answeredCount === quizData.length) showResult();
}

function updateScore() {
  document.getElementById('s-correct').textContent = correctCount;
  document.getElementById('s-wrong').textContent = wrongCount;
  const pct = answeredCount > 0 ? Math.round(correctCount / answeredCount * 100) : 0;
  document.getElementById('s-score').textContent = pct + '%';
  const totalPct = Math.round(answeredCount / quizData.length * 100);
  document.getElementById('progress-bar').style.width = totalPct + '%';
}

function showResult() {
  const banner = document.getElementById('result-banner');
  const title = document.getElementById('result-title');
  const msg = document.getElementById('result-msg');
  const pct = Math.round(correctCount / quizData.length * 100);

  let emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '📚' : '💪';
  title.textContent = `${emoji} 퀴즈 완료! ${correctCount}/${quizData.length} 정답 (${pct}점)`;

  if (pct >= 90) msg.textContent = '훌륭합니다! 완벽한 이해도를 보여주셨어요.';
  else if (pct >= 70) msg.textContent = '잘 하셨어요! 틀린 문제를 한 번 더 복습해보세요.';
  else if (pct >= 50) msg.textContent = '절반 이상 맞추셨어요! 조금 더 복습이 필요합니다.';
  else msg.textContent = '다시 한 번 도전해보세요! 개념 복습 후 재시도를 추천합니다.';

  banner.classList.add('show');
  banner.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showAllAnswers() {
  quizData.forEach((item, i) => {
    const input = document.getElementById(`input-${i}`);
    const btn = document.getElementById(`btn-${i}`);
    const card = document.getElementById(`card-${i}`);
    const feedback = document.getElementById(`feedback-${i}`);

    if (!btn.disabled) {
      input.disabled = true;
      btn.disabled = true;
      answeredCount++;
      wrongCount++;
      card.classList.add('answered-wrong');
      feedback.className = 'feedback wrong show';
      feedback.innerHTML = `📖 정답: <span class="correct-answer">${item.display}</span><div class="explanation">${item.exp}</div>`;
    }
  });
  updateScore();
  showResult();
}

function resetQuiz() {
  correctCount = 0;
  wrongCount = 0;
  answeredCount = 0;
  document.getElementById('result-banner').classList.remove('show');
  document.getElementById('s-correct').textContent = '0';
  document.getElementById('s-wrong').textContent = '0';
  document.getElementById('s-score').textContent = '0%';
  document.getElementById('progress-bar').style.width = '0%';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
